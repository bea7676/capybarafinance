<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦫 Capybara Finance - The Chill Investment Game</title>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Comic Neue', 'Chalkboard SE', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8B6914 0%, #D4A017 50%, #F5D060 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        
        body::before {
            content: "🦫";
            position: fixed;
            font-size: 100px;
            opacity: 0.05;
            bottom: 20px;
            right: 20px;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 248, 220, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            backdrop-filter: blur(5px);
            border: 3px solid #F5D060;
        }
        
        .header {
            background: linear-gradient(135deg, #5C4033, #8B6914);
            color: #FFE4B5;
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: "🦫🦫🦫";
            position: absolute;
            font-size: 60px;
            opacity: 0.1;
            left: -20px;
            top: -20px;
            animation: float 4s ease-in-out infinite;
        }
        
        .header::after {
            content: "🦫🦫🦫";
            position: absolute;
            font-size: 60px;
            opacity: 0.1;
            right: -20px;
            bottom: -20px;
            animation: float 5s ease-in-out infinite reverse;
        }
        
        .header h1 {
            font-size: 2.5em;
            text-shadow: 3px 3px 0 #5C4033;
            animation: fadeIn 1s ease-out;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .game-info {
            display: flex;
            justify-content: space-around;
            background: #5C4033;
            padding: 15px;
            color: #FFE4B5;
            flex-wrap: wrap;
            border-bottom: 3px solid #F5D060;
        }
        
        .game-info div {
            font-size: 18px;
            margin: 5px;
            padding: 8px 15px;
            background: rgba(255, 228, 181, 0.1);
            border-radius: 20px;
            animation: fadeIn 0.5s ease-out;
        }
        
        .game-info span {
            font-weight: bold;
            color: #F5D060;
        }
        
        .main-content {
            display: flex;
            padding: 20px;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .players-table {
            flex: 2;
            overflow-x: auto;
            min-width: 300px;
            animation: fadeIn 0.6s ease-out;
        }
        
        .actions-panel {
            flex: 1;
            background: linear-gradient(135deg, #FFF8DC, #FFE4B5);
            padding: 20px;
            border-radius: 20px;
            min-width: 250px;
            border: 2px solid #F5D060;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: fadeIn 0.7s ease-out;
        }
        
        .actions-panel h3 {
            color: #5C4033;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 15px;
            overflow: hidden;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #F5D060;
        }
        
        th {
            background: #8B6914;
            color: white;
            font-weight: bold;
        }
        
        tr {
            transition: all 0.3s ease;
        }
        
        .current-turn {
            background: linear-gradient(90deg, #FFF3C4, #FFE4B5);
            font-weight: bold;
            animation: bounce 0.5s ease;
        }
        
        .in-jail {
            background: #FFE4E4;
            color: #dc2626;
            animation: shake 0.5s ease;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: linear-gradient(135deg, #8B6914, #D4A017);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 3px 5px rgba(0,0,0,0.2);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #D4A017, #F5D060);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .danger-btn {
            background: linear-gradient(135deg, #dc2626, #ef4444);
        }
        
        .danger-btn:hover {
            background: linear-gradient(135deg, #ef4444, #f87171);
        }
        
        .success-btn {
            background: linear-gradient(135deg, #059669, #10b981);
        }
        
        .success-btn:hover {
            background: linear-gradient(135deg, #10b981, #34d399);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #FFF8DC, #FFE4B5);
            padding: 30px;
            border-radius: 30px;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
            border: 3px solid #F5D060;
            animation: slideIn 0.3s ease-out;
        }
        
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .podium {
            text-align: center;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            min-width: 180px;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease-out;
        }
        
        .podium:hover {
            transform: translateY(-5px);
        }
        
        .podium-1 {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            height: 200px;
            order: 2;
            box-shadow: 0 -5px 20px rgba(255,215,0,0.5);
        }
        
        .podium-2 {
            background: linear-gradient(135deg, #c0c0c0, #e8e8e8);
            height: 150px;
            order: 1;
        }
        
        .podium-3 {
            background: linear-gradient(135deg, #cd7f32, #e8a866);
            height: 100px;
            order: 3;
        }
        
        .podium h2 {
            font-size: 28px;
            margin: 10px 0;
            color: #5C4033;
        }
        
        .podium .trophy {
            font-size: 48px;
            animation: bounce 1s ease infinite;
        }
        
        .podium .amount {
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .medal {
            font-size: 36px;
        }
        
        .ranking-list {
            margin-top: 30px;
            border-top: 2px solid #F5D060;
            padding-top: 20px;
        }
        
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255, 248, 220, 0.8);
            border-radius: 15px;
            transition: all 0.3s ease;
        }
        
        .ranking-item:hover {
            transform: translateX(5px);
            background: #FFF8DC;
        }
        
        .health-conversion {
            background: linear-gradient(135deg, #FEF3C7, #FFE4B5);
            padding: 15px;
            border-radius: 20px;
            margin: 15px 0;
            border: 2px solid #F5D060;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .jail-badge {
            display: inline-block;
            background: #dc2626;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 8px;
            animation: shake 0.5s ease;
        }
        
        .capybara-emoji {
            font-size: 24px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .podium {
                min-width: 120px;
            }
            .podium-1 { height: 150px; }
            .podium-2 { height: 120px; }
            .podium-3 { height: 90px; }
            .podium .amount { font-size: 12px; }
            .header h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦫 CAPYBARA FINANCE 🦫</h1>
            <p>The Chillest Investment Game in the Pond</p>
        </div>
        
        <div class="game-info">
            <div>📊 Round: <span id="roundNum">1</span> / 5</div>
            <div>👥 Players: <span id="playerCount">0</span></div>
            <div>🎯 Current Turn: <span id="currentPlayer">-</span></div>
            <div>🚫 In Jail: <span id="jailStatus">None</span></div>
            <div><span class="capybara-emoji">🦫</span> Chill Mode: <span id="chillMode">ACTIVE</span></div>
        </div>
        
        <div class="main-content">
            <div class="players-table">
                <table id="playersTable">
                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>Monthly Income</th>
                            <th>Cash</th>
                            <th>Investments</th>
                            <th>Health</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="playersTableBody">
                    </tbody>
                </table>
            </div>
            
            <div class="actions-panel">
                <h3>🎮 Game Actions</h3>
                <button onclick="setupGame()">1. 🌱 Setup Game</button>
                <button onclick="modifyIncome()">2. 💰 Modify Monthly Income</button>
                <button onclick="modifyCash()">3. 💵 Modify Cash (+/-)</button>
                <button onclick="addInvestment()">4. 📈 Add Investment</button>
                <button onclick="modifyHealth()">5. ❤️ Modify Health (+/-)</button>
                <button onclick="sendToJail()">6. 🚫 Send to Jail</button>
                <button onclick="endTurn()" class="success-btn">7. ✅ End Turn</button>
                <button onclick="endRound()" class="success-btn">8. 🏁 End Round</button>
                <button onclick="showReport()">9. 📊 Full Report</button>
                <button onclick="resetGame()" class="danger-btn">10. 🔄 Reset Game</button>
            </div>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <div id="modalContent"></div>
            <button onclick="closeModal()" style="margin-top: 20px;">Close 🦫</button>
        </div>
    </div>

    <script>
        // ========== GAME STATE ==========
        let players = [];
        let currentRound = 1;
        let currentPlayerIndex = 0;
        let playersActedThisRound = [];
        let gameActive = true;
        let totalRounds = 5;
        
        // ========== SETUP ==========
        function setupGame() {
            const numPlayers = parseInt(prompt("How many capybaras? (1-5)", "2"));
            if (isNaN(numPlayers) || numPlayers < 1 || numPlayers > 5) {
                showNotification("Please enter 1-5 players!", "error");
                return;
            }
            
            players = [];
            for (let i = 0; i < numPlayers; i++) {
                const name = prompt(`Capybara ${i+1} name:`, `Capy ${i+1}`);
                players.push({
                    id: i,
                    name: name,
                    monthlyIncome: 5000,
                    cash: 0,
                    investments: [],
                    health: 5,
                    inJail: false,
                    skipNextRound: false  // This persists through end of round
                });
            }
            
            currentRound = 1;
            currentPlayerIndex = 0;
            playersActedThisRound = [];
            gameActive = true;
            
            updateUI();
            showNotification(`🦫 Welcome ${players.length} capybaras! Each starts with $5,000 monthly income and 5 health. Chill mode: ON!`);
        }
        
        // ========== UI UPDATE ==========
        function updateUI() {
            document.getElementById('roundNum').textContent = currentRound;
            document.getElementById('playerCount').textContent = players.length;
            
            if (players.length > 0 && gameActive) {
                document.getElementById('currentPlayer').textContent = players[currentPlayerIndex].name;
                const jailedPlayers = players.filter(p => p.skipNextRound).map(p => p.name);
                document.getElementById('jailStatus').textContent = jailedPlayers.length > 0 ? jailedPlayers.join(', ') + ' (next round)' : 'None';
            }
            
            const tbody = document.getElementById('playersTableBody');
            tbody.innerHTML = '';
            
            players.forEach((player, idx) => {
                const row = tbody.insertRow();
                const isCurrentTurn = (idx === currentPlayerIndex && gameActive);
                const willSkipNextRound = player.skipNextRound;
                
                if (isCurrentTurn) row.className = 'current-turn';
                if (willSkipNextRound && !isCurrentTurn) row.style.opacity = '0.7';
                
                // Player name
                let nameCell = row.insertCell(0);
                nameCell.innerHTML = isCurrentTurn ? `👉 ${player.name} 👈` : player.name;
                if (willSkipNextRound) {
                    nameCell.innerHTML += ' <span class="jail-badge">🚫 JAIL NEXT ROUND</span>';
                }
                
                // Monthly income
                let incomeCell = row.insertCell(1);
                incomeCell.innerHTML = `$${player.monthlyIncome.toLocaleString()}`;
                
                // Cash
                let cashCell = row.insertCell(2);
                cashCell.innerHTML = `$${player.cash.toLocaleString()}`;
                cashCell.style.color = player.cash < 0 ? '#dc2626' : '#10b981';
                
                // Investments
                let investCell = row.insertCell(3);
                if (player.investments.length === 0) {
                    investCell.innerHTML = 'None 🌱';
                } else {
                    investCell.innerHTML = player.investments.map(inv => 
                        `💰 $${inv.amount.toLocaleString()} @ ${inv.rate}%`
                    ).join('<br>');
                }
                
                // Health
                let healthCell = row.insertCell(4);
                let healthEmoji = player.health > 7 ? '🦫💪' : player.health > 3 ? '🦫' : '😢';
                healthCell.innerHTML = `${healthEmoji} ${player.health}`;
                healthCell.style.color = player.health < 3 ? '#dc2626' : '#10b981';
                
                // Status
                let statusCell = row.insertCell(5);
                if (player.skipNextRound) {
                    statusCell.innerHTML = '🚫 IN JAIL (skip next round)';
                } else if (playersActedThisRound.includes(player.id)) {
                    statusCell.innerHTML = '✅ Acted this round';
                } else {
                    statusCell.innerHTML = '⏳ Pending';
                }
            });
        }
        
        // ========== CURRENT PLAYER HELPER ==========
        function getCurrentPlayer() {
            if (!gameActive || players.length === 0) {
                showNotification("Game not active or no players!", "error");
                return null;
            }
            return players[currentPlayerIndex];
        }
        
        function canTakeAction() {
            const player = getCurrentPlayer();
            if (!player) return false;
            
            // If player is skipping next round, they cannot act
            if (player.skipNextRound) {
                showNotification(`🚫 ${player.name} is in jail for next round! Cannot take actions this round. Press 'End Turn' to skip.`);
                return false;
            }
            return true;
        }
        
        // ========== GAME ACTIONS ==========
        function modifyIncome() {
            if (!canTakeAction()) return;
            const player = getCurrentPlayer();
            if (!player) return;
            
            const amount = parseFloat(prompt(`🦫 Current monthly income: $${player.monthlyIncome.toLocaleString()}\nEnter new monthly income:`, player.monthlyIncome));
            if (!isNaN(amount) && amount >= 0) {
                player.monthlyIncome = amount;
                showNotification(`✅ ${player.name}'s monthly income set to $${amount.toLocaleString()}`);
                updateUI();
            }
        }
        
        function modifyCash() {
            if (!canTakeAction()) return;
            const player = getCurrentPlayer();
            if (!player) return;
            
            const amount = parseFloat(prompt(`💰 Current cash: $${player.cash.toLocaleString()}\nEnter amount (+ for addition, - for subtraction):`, "0"));
            if (!isNaN(amount)) {
                player.cash += amount;
                const action = amount >= 0 ? "gained" : "lost";
                showNotification(`✅ ${player.name} ${action} $${Math.abs(amount).toLocaleString()}`);
                updateUI();
            }
        }
        
        function addInvestment() {
            if (!canTakeAction()) return;
            const player = getCurrentPlayer();
            if (!player) return;
            
            const amount = parseFloat(prompt("📈 Investment amount: $", "1000"));
            if (isNaN(amount) || amount <= 0) {
                showNotification("Invalid amount!", "error");
                return;
            }
            
            const rate = parseFloat(prompt("Interest rate (1-5%):", "3"));
            if (isNaN(rate) || rate < 1 || rate > 5) {
                showNotification("Interest rate must be between 1 and 5%!", "error");
                return;
            }
            
            player.investments.push({
                id: Date.now(),
                amount: amount,
                rate: rate
            });
            
            player.cash -= amount;
            showNotification(`🦫 ${player.name} invested $${amount.toLocaleString()} at ${rate}% interest! Smart capybara!`);
            updateUI();
        }
        
        function modifyHealth() {
            if (!canTakeAction()) return;
            const player = getCurrentPlayer();
            if (!player) return;
            
            const change = parseInt(prompt(`❤️ Current health: ${player.health}\nEnter change (+ to gain, - to lose):`, "0"));
            if (!isNaN(change)) {
                player.health += change;
                const action = change >= 0 ? "gained" : "lost";
                showNotification(`🦫 ${player.name} ${action} ${Math.abs(change)} health. Health now: ${player.health}`);
                
                if (player.health <= 0) {
                    showNotification(`💀 GAME OVER! ${player.name} has left the pond!`, "error");
                    gameActive = false;
                    updateUI();
                } else {
                    updateUI();
                }
            }
        }
        
        function sendToJail() {
            const player = getCurrentPlayer();
            if (!player) return;
            
            if (player.skipNextRound) {
                showNotification(`⚠️ ${player.name} is already in jail!`, "error");
                return;
            }
            
            // Send to jail - they will skip NEXT round (not current)
            player.skipNextRound = true;
            showNotification(`🚫 ${player.name} sent to jail! They will skip the NEXT round completely.`);
            updateUI();
        }
        
        function endTurn() {
            const player = getCurrentPlayer();
            if (!player) return;
            
            // Mark as acted
            if (!playersActedThisRound.includes(player.id)) {
                playersActedThisRound.push(player.id);
                if (player.skipNextRound) {
                    showNotification(`🚫 ${player.name} is in jail for next round. Skipping this turn.`);
                } else {
                    showNotification(`✅ ${player.name} finished their turn! 🦫`);
                }
            }
            
            // Find next player who hasn't acted
            let nextFound = false;
            for (let i = 1; i <= players.length; i++) {
                const nextIndex = (currentPlayerIndex + i) % players.length;
                const nextPlayer = players[nextIndex];
                
                if (!playersActedThisRound.includes(nextPlayer.id)) {
                    currentPlayerIndex = nextIndex;
                    nextFound = true;
                    break;
                }
            }
            
            if (!nextFound) {
                // All players have acted - end the round
                endRound();
            } else {
                updateUI();
                const nextPlayer = players[currentPlayerIndex];
                if (nextPlayer.skipNextRound) {
                    showNotification(`🚫 ${nextPlayer.name} is in jail for next round! Press 'End Turn' to skip.`);
                } else {
                    showNotification(`🦫 Now it's ${nextPlayer.name}'s turn!`);
                }
            }
        }
        
        function endRound() {
            if (!gameActive) {
                showNotification("Game already ended!", "error");
                return;
            }
            
            // Calculate annual income and update cash
            let roundSummary = [];
            
            for (let player of players) {
                // Annual income = monthly income × 12
                const annualIncome = player.monthlyIncome * 12;
                player.cash += annualIncome;
                
                // Calculate investment returns (interest on investments)
                let totalInvestmentReturn = 0;
                for (let inv of player.investments) {
                    const annualReturn = inv.amount * (inv.rate / 100);
                    totalInvestmentReturn += annualReturn;
                    inv.amount += annualReturn;
                }
                player.cash += totalInvestmentReturn;
                
                roundSummary.push({
                    name: player.name,
                    monthlyIncome: player.monthlyIncome,
                    annualIncome: annualIncome,
                    investmentReturn: totalInvestmentReturn,
                    cash: player.cash,
                    health: player.health,
                    skipNextRound: player.skipNextRound,
                    investments: [...player.investments]
                });
                
                // IMPORTANT: DO NOT reset skipNextRound here!
                // Jail status persists to next round
            }
            
            // Show popup with round stats
            showRoundPopup(roundSummary);
            
            currentRound++;
            playersActedThisRound = [];
            currentPlayerIndex = 0;
            
            if (currentRound > totalRounds) {
                gameActive = false;
                showFinalReportWithPodium();
            } else {
                showNotification(`🎉 ROUND ${currentRound - 1} COMPLETE! Starting Round ${currentRound}`);
                
                // Show which players are still in jail for next round
                const jailedPlayers = players.filter(p => p.skipNextRound).map(p => p.name);
                if (jailedPlayers.length > 0) {
                    showNotification(`🚫 ${jailedPlayers.join(', ')} are still in jail and will skip Round ${currentRound}!`, "error");
                }
                
                updateUI();
                showNotification(`🦫 Round ${currentRound} begins! ${players[0].name} starts.`);
            }
        }
        
        function showRoundPopup(summary) {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            
            let html = `<h2>📊 END OF ROUND ${currentRound} REPORT</h2>`;
            html += `<div class="capybara-emoji" style="font-size: 40px; text-align: center;">🦫🦫🦫</div>`;
            
            for (let s of summary) {
                html += `
                    <div style="border: 2px solid #F5D060; padding: 15px; margin: 15px 0; border-radius: 15px; background: rgba(255,248,220,0.8);">
                        <h3>${s.name} ${s.skipNextRound ? '🚫 (JAILED - Will skip next round!)' : '✅ (Free)'}</h3>
                        <p>💰 Monthly Income: $${s.monthlyIncome.toLocaleString()}</p>
                        <p>📅 Annual Income (×12): $${s.annualIncome.toLocaleString()}</p>
                        <p>📈 Investment Returns: $${s.investmentReturn.toLocaleString()}</p>
                        <p>💵 Total Cash After Round: $${s.cash.toLocaleString()}</p>
                        <p>❤️ Health: ${s.health}</p>
                        <p>📊 Investments:</p>
                        <ul>
                `;
                
                if (s.investments.length === 0) {
                    html += `<li>No investments 🌱</li>`;
                } else {
                    for (let inv of s.investments) {
                        html += `<li>💰 $${inv.amount.toLocaleString()} @ ${inv.rate}% p.a.</li>`;
                    }
                }
                
                html += `</ul></div>`;
            }
            
            modalContent.innerHTML = html;
            modal.style.display = 'flex';
        }
        
        function showFinalReportWithPodium() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            
            // Calculate total wealth for each player
            let rankings = [];
            for (let player of players) {
                let investmentTotal = player.investments.reduce((sum, inv) => sum + inv.amount, 0);
                let totalWealth = player.cash + investmentTotal;
                
                // Convert health points to cash bonus ($1,000 per health point)
                let healthBonus = player.health * 1000;
                let finalScore = totalWealth + healthBonus;
                
                rankings.push({
                    name: player.name,
                    wealth: totalWealth,
                    health: player.health,
                    healthBonus: healthBonus,
                    finalScore: finalScore
                });
            }
            
            // Sort by final score (highest first)
            rankings.sort((a, b) => b.finalScore - a.finalScore);
            
            // Create podium HTML
            let html = `
                <h1 style="text-align: center;">🏆 GAME OVER! 🏆</h1>
                <div style="text-align: center; font-size: 60px;">🦫👑🦫</div>
                <h2 style="text-align: center;">Final Capybara Rankings with Health Conversion</h2>
                
                <div class="health-conversion">
                    <h3>💝 Health Point Conversion:</h3>
                    <p>Each health point = $1,000 bonus added to total wealth!</p>
                    <p>Final Score = (Cash + Investments) + (Health × $1,000)</p>
                    <p style="text-align: center; font-size: 20px;">🦫 A healthy capybara is a wealthy capybara! 🦫</p>
                </div>
                
                <div class="podium-container">
            `;
            
            // Podium positions (1st, 2nd, 3rd)
            const medals = ['🥇', '🥈', '🥉'];
            
            for (let i = 0; i < Math.min(3, rankings.length); i++) {
                const r = rankings[i];
                html += `
                    <div class="podium podium-${i+1}">
                        <div class="medal">${medals[i]}</div>
                        <h2>${r.name}</h2>
                        <div class="trophy">${i === 0 ? '👑🦫👑' : '🏆'}</div>
                        <div class="amount">💰 $${r.finalScore.toLocaleString()}</div>
                        <div style="font-size: 12px; margin-top: 10px;">
                            Wealth: $${r.wealth.toLocaleString()}<br>
                            Health: ${r.health} → +$${r.healthBonus.toLocaleString()}
                        </div>
                    </div>
                `;
            }
            
            html += `</div><div class="ranking-list"><h3>📊 Complete Capybara Rankings:</h3>`;
            
            for (let i = 0; i < rankings.length; i++) {
                const r = rankings[i];
                const medalIcon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
                html += `
                    <div class="ranking-item">
                        <span><strong>${medalIcon}</strong> ${r.name} ${i === 0 ? '🦫👑' : '🦫'}</span>
                        <span>💰 $${r.finalScore.toLocaleString()}</span>
                        <span style="font-size: 11px; color: #8B6914;">
                            ($${r.wealth.toLocaleString()} + ${r.health}❤️ = $${r.healthBonus.toLocaleString()})
                        </span>
                    </div>
                `;
            }
            
            html += `</div>`;
            modalContent.innerHTML = html;
            modal.style.display = 'flex';
        }
        
        function showReport() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            
            let html = `<h2>📊 CURRENT GAME REPORT - ROUND ${currentRound}</h2>`;
            html += `<div class="capybara-emoji" style="font-size: 30px; text-align: center;">🦫 Chill Report 🦫</div>`;
            let totalWealth = 0;
            
            for (let player of players) {
                let investmentTotal = player.investments.reduce((sum, inv) => sum + inv.amount, 0);
                let totalValue = player.cash + investmentTotal;
                totalWealth += totalValue;
                
                html += `
                    <div style="border: 2px solid #F5D060; padding: 15px; margin: 15px 0; border-radius: 15px;">
                        <h3>${player.name} ${player.skipNextRound ? '🚫 (JAILED - Skip next round)' : '🦫 (Free)'}</h3>
                        <p>💰 Monthly Income: $${player.monthlyIncome.toLocaleString()}</p>
                        <p>💵 Cash: $${player.cash.toLocaleString()}</p>
                        <p>📈 Total Investments: $${investmentTotal.toLocaleString()}</p>
                        <p>💎 Total Wealth: $${totalValue.toLocaleString()}</p>
                        <p>❤️ Health: ${player.health}</p>
                `;
                
                if (player.investments.length > 0) {
                    html += `<p>📊 Investment Details:</p><ul>`;
                    for (let inv of player.investments) {
                        html += `<li>💰 $${inv.amount.toLocaleString()} @ ${inv.rate}% p.a.</li>`;
                    }
                    html += `</ul>`;
                }
                
                html += `</div>`;
            }
            
            html += `<h3>💰 TOTAL WEALTH: $${totalWealth.toLocaleString()}</h3>`;
            modalContent.innerHTML = html;
            modal.style.display = 'flex';
        }

            gameActive = true;
            updateUI();
            showNotification("🦫 Game reset! Time for a fresh pond! Click 'Setup Game' to start.");
        }
